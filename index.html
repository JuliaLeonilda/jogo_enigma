<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogo de Enigmas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🧩 Jogo de Enigmas</h1>

  <div class="layout">

    <div class="lado-jogo">
      <input type="text" id="nome" placeholder="Digite seu nome">
      <button onclick="iniciarJogo()">Começar</button>

      <div id="jogo">
        <p id="pergunta"></p>
        <p id="tempo"></p>
        <input type="text" id="resposta">
        <button onclick="verificar()">Responder</button>
        <p id="feedback"></p>
        <p id="pontos"></p>
      </div>
    </div>

    <div class="lado-ranking">
      <div id="ranking"></div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
